version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fintrackpro-sqlserver
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    # Health check so dependent services wait until SQL Server is actually ready,
    # not just started. Uses sqlcmd bundled in the mssql image.
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -Q 'SELECT 1' -No -C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: fintrackpro-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
    ports:
      - "8080:8080"

  # Init container: runs EF Core migrations then exits.
  # Uses the SDK image (dotnet-ef available) so the runtime API image stays lean.
  # api waits for this to complete successfully before starting.
  migrator:
    build:
      context: ./backend
      dockerfile: Dockerfile.migrator
    container_name: fintrackpro-migrator
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=FinTrackPro;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=true;"
    depends_on:
      sqlserver:
        condition: service_healthy

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintrackpro-api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=FinTrackPro;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=true;"
      Keycloak__Authority: "http://keycloak:8080/realms/fintrackpro"
      Keycloak__Audience: "fintrackpro-api"
      Telegram__BotToken: "${TELEGRAM_BOT_TOKEN}"
      Cors__Origins: "http://localhost:5173"
    depends_on:
      sqlserver:
        condition: service_healthy
      keycloak:
        condition: service_started
      migrator:
        condition: service_completed_successfully

volumes:
  sqlserver-data:
