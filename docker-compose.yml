version: '3.9'

services:
  sqlserver:
    # azure-sql-edge is Microsoft's ARM64-native SQL Server variant.
    # On Windows/Linux (amd64), Docker pulls the amd64 layer automatically — no behavioural difference.
    # mssql/server:2022 has no ARM64 image and crashes under QEMU emulation on Apple Silicon.
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: fintrackpro-sqlserver
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "1"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    # Health check so dependent services wait until SQL Server is actually ready,
    # not just started.
    # azure-sql-edge does not ship sqlcmd, so we use a TCP connect test instead.
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1433'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: fintrackpro-keycloak
    # --import-realm scans /opt/keycloak/data/import/ on startup.
    # Import is idempotent: if the realm already exists it is skipped, so manual
    # changes (extra users, social login) persist across restarts.
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./infra/docker/keycloak-realm.json:/opt/keycloak/data/import/fintrackpro-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/fintrackpro || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s

  # Init container: runs EF Core migrations then exits.
  # Uses the SDK image (dotnet-ef available) so the runtime API image stays lean.
  # api waits for this to complete successfully before starting.
  migrator:
    build:
      context: ./backend
      dockerfile: Dockerfile.migrator
    container_name: fintrackpro-migrator
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=FinTrackPro;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=true;"
    depends_on:
      sqlserver:
        condition: service_healthy

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintrackpro-api
    ports:
      - "5018:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=FinTrackPro;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=true;"
      Keycloak__Authority: "http://localhost:8080/realms/fintrackpro"
      Keycloak__MetadataAddress: "http://keycloak:8080/realms/fintrackpro/.well-known/openid-configuration"
      IdentityProvider__Audience: "https://api.fintrackpro.dev"
      IdentityProvider__AdminClientId: "fintrackpro-api"
      Telegram__BotToken: "${TELEGRAM_BOT_TOKEN}"
      Cors__Origins: "http://localhost:5173"
    depends_on:
      sqlserver:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

volumes:
  sqlserver-data:
  keycloak-data:
