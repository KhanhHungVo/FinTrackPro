name: Rotate Render PostgreSQL

# Runs on the 1st and 26th of each month (~25-day cycle) to rotate the Render
# free-tier PostgreSQL before its 30-day expiry. Can also be triggered manually.
#
# Required secrets  : RENDER_API_KEY, RENDER_OWNER_ID
# Required variables: RENDER_SERVICE_ID, API_HEALTH_URL
#
# See docs/guides/db-rotation.md for setup instructions.

on:
  schedule:
    - cron: '0 2 1,26 * *'   # 2 AM UTC on the 1st and 26th of each month
  workflow_dispatch:           # manual trigger for first run or emergencies

permissions:
  contents: read

jobs:
  rotate:
    name: Rotate free-tier PostgreSQL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install PostgreSQL 18 client
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSo /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-18

      - name: Rotate database
        env:
          RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
          RENDER_OWNER_ID:   ${{ secrets.RENDER_OWNER_ID }}
          RENDER_SERVICE_ID: ${{ vars.RENDER_SERVICE_ID }}
          API_HEALTH_URL:    ${{ vars.API_HEALTH_URL }}
        run: bash scripts/rotate-render-db.sh

      - name: Annotate on failure
        if: failure()
        run: |
          echo "::error::DB rotation failed — old DB is still active, no data was lost."
          echo "::error::Check the logs above, fix the issue, and re-run this workflow manually before the DB expires."
