name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: fintrackpro_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: YourStrong@Passw0rd
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend/FinTrackPro.slnx

      - name: Build
        run: dotnet build backend/FinTrackPro.slnx --no-restore -c Release

      - name: Unit Tests
        run: dotnet test backend/FinTrackPro.slnx --no-build -c Release --filter "Category!=Integration" --logger "trx;LogFileName=unit-test-results.trx"

      - name: Integration Tests
        env:
          TEST_DB_CONNECTION_STRING: "Host=localhost;Port=5432;Database=fintrackpro_test;Username=postgres;Password=YourStrong@Passw0rd"
        run: dotnet test backend/FinTrackPro.slnx --no-build -c Release --filter "Category=Integration" --logger "trx;LogFileName=integration-test-results.trx"

      - name: Docker Build
        run: docker build -t fintrackpro-api:${{ github.sha }} ./backend

  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/fintrackpro-ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/fintrackpro-ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Unit Tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.fintrackpro.example.com
          VITE_AUTH_PROVIDER: keycloak
          VITE_KEYCLOAK_URL: http://localhost:8080
          VITE_KEYCLOAK_REALM: fintrackpro
          VITE_KEYCLOAK_CLIENT_ID: fintrackpro-spa

  e2e:
    name: Frontend — E2E (Playwright)
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/fintrackpro-ui
    steps:
      - uses: actions/checkout@v4

      - name: Start PostgreSQL + Keycloak
        working-directory: .
        run: |
          docker compose up -d postgres keycloak
          echo "Waiting for Keycloak to become ready…"
          for i in $(seq 1 36); do
            curl -sf http://localhost:8080/realms/fintrackpro && echo "Keycloak ready" && break
            echo "  attempt $i/36 — sleeping 5s"
            sleep 5
          done
          curl -sf http://localhost:8080/realms/fintrackpro \
            || { echo "Keycloak failed to start within 180s"; docker compose logs keycloak; exit 1; }

      - name: Start API
        working-directory: .
        run: |
          docker compose up -d api
          for i in $(seq 1 30); do
            curl -sf http://localhost:5018/health && break || sleep 3
          done

      - name: Mint E2E token
        working-directory: .
        run: |
          TOKEN=$(curl -sf -X POST \
            http://localhost:8080/realms/fintrackpro/protocol/openid-connect/token \
            -d "grant_type=password" \
            -d "client_id=fintrackpro-e2e" \
            -d "username=admin@fintrackpro.dev" \
            -d "password=Admin1234!" \
            | sed 's/.*"access_token":"\([^"]*\)".*/\1/')
          echo "E2E_TOKEN=$TOKEN" >> $GITHUB_ENV

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/fintrackpro-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          E2E_TOKEN: ${{ env.E2E_TOKEN }}
          E2E_BASE_URL: http://localhost:5173
          VITE_API_BASE_URL: http://localhost:5018
          VITE_AUTH_PROVIDER: keycloak
          VITE_KEYCLOAK_URL: http://localhost:8080
          VITE_KEYCLOAK_REALM: fintrackpro
          VITE_KEYCLOAK_CLIENT_ID: fintrackpro-spa
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/fintrackpro-ui/playwright-report/
          retention-days: 7
