name: External API Schema Check

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch:       # manual trigger

jobs:
  schema-check:
    name: Verify external API schemas
    runs-on: ubuntu-latest
    continue-on-error: true  # informational only — never blocks a PR
    env:
      COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
      EXCHANGE_RATE_API_KEY: ${{ secrets.EXCHANGE_RATE_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Run external schema checks
        run: |
          newman run docs/postman/FinTrackPro.external-schema.postman_collection.json \
            -e docs/postman/FinTrackPro.postman_environment.json \
            --env-var "coinGeckoApiKey=$COINGECKO_API_KEY" \
            --env-var "exchangeRateApiKey=$EXCHANGE_RATE_API_KEY" \
            --reporters cli
